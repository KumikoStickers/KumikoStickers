<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Store</title>

  <link rel="stylesheet" href="style.css">

  <style>
    :root{
      --bg:#0f0f12;
      --card:#17171c;
      --accent:#b08cff;
      --text:#f2f2f2;
      --muted:#a0a0a0;
    }

    body{
      margin:0;
      font-family:system-ui, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 30px;
      border-bottom:1px solid #222;
      position:sticky;
      top:0;
      background:rgba(15,15,18,0.9);
      backdrop-filter:blur(8px);
      z-index:1000;
    }

    h1{
      font-size:20px;
      letter-spacing:1px;
      margin:0;
    }

    /* FIX 1: cart pinned top right */
    .header-right{
      position:fixed;
      top:20px;
      right:20px;
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:10px;
      z-index:2000;
    }

    .cart-icon{
      cursor:pointer;
      background:var(--card);
      padding:10px 14px;
      border-radius:12px;
      transition:0.2s;
      display:flex;
      gap:6px;
      align-items:center;
    }

    .cart-icon:hover{
      transform:scale(1.05);
      background:#222;
    }

    .cart{
      width:280px;
      background:var(--card);
      border:1px solid #222;
      border-radius:14px;
      padding:15px;
      display:none;
      flex-direction:column;
      gap:10px;
    }

    .cart.open{
      display:flex;
    }

    /* FIX 2: more open layout flow */
    main{
      padding:40px;
      display:flex;
      flex-direction:column;
      gap:60px;
    }

    /* FIX 3: stronger category separation */
    .category{
      display:flex;
      flex-direction:column;
      gap:15px;
      padding-bottom:30px;
      border-bottom:1px solid #222;
    }

    .category h2{
      font-size:18px;
      margin:0;
      border-left:3px solid var(--accent);
      padding-left:10px;
    }

    /* FIX 4: wider, more natural grid flow */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
      gap:18px;
      width:100%;
    }

    .product{
      background:var(--card);
      border-radius:16px;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      transition:0.2s;
    }

    .product:hover{
      transform:translateY(-4px);
    }

    .product img{
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      border-radius:12px;
    }

    .price{
      color:var(--accent);
      font-weight:bold;
    }

    button{
      padding:10px;
      border:none;
      border-radius:10px;
      background:var(--accent);
      color:black;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      filter:brightness(1.1);
    }
  </style>
</head>

<body class="store-page">

<header>
  <h1>My Store ✦</h1>

  <div class="header-right">
    <div class="cart-icon" onclick="toggleCart()">
      🛒 <span id="cart-count">0</span>
    </div>

    <div id="cart" class="cart">
      <h3>Your Basket</h3>
      <ul id="cart-items"></ul>
      <p>Total: £<span id="total">0</span></p>
      <button onclick="checkout()">Checkout</button>
    </div>
  </div>
</header>

<main>

  <section class="category">
    <h2>Stickers</h2>
    <div class="grid" id="stickers"></div>
  </section>

  <section class="category">
    <h2>Earrings</h2>
    <div class="grid" id="earrings"></div>
  </section>

  <section class="category">
    <h2>Keychains</h2>
    <div class="grid" id="keychains"></div>
  </section>

  <section class="category">
    <h2>Pins</h2>
    <div class="grid" id="pins"></div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
