<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Store</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="store-page">

<header>
  <h1>My Store ✦</h1>

  <div class="header-right">
    <div class="cart-icon" onclick="toggleCart()">
      🛒 <span id="cart-count">0</span>
    </div>

    <div id="cart" class="cart">
      <h3>Your Basket</h3>
      <ul id="cart-items"></ul>
      <p>Subtotal: £<span id="subtotal">0</span></p>
      <p>Shipping: £<span id="shipping">0</span></p>
      <p><strong>Total: £<span id="total">0</span></strong></p>
      <div id="paypal-button-container"></div>
    </div>
  </div>
</header>

<main>

  <section class="category">
    <h2>Stickers</h2>
    <div class="grid" id="stickers"></div>
  </section>

  <section class="category">
    <h2>Earrings</h2>
    <div class="grid" id="earrings"></div>
  </section>

  <section class="category">
    <h2>Keychains</h2>
    <div class="grid" id="keychains"></div>
  </section>

  <section class="category">
    <h2>Pins</h2>
    <div class="grid" id="pins"></div>
  </section>

</main>

<!-- 🔥 STEP 2: FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "kumiko-store",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.firebaseDB = db;
  window.firebaseAddDoc = addDoc;
  window.firebaseCollection = collection;
</script>

<script src="https://www.paypal.com/sdk/js?client-id=ASdhm1ibTGm3XLF-Bab_Hqe_S6VM1P3b8M6JJOGvO35Zb6JpgVmF_bdGMk7f4LDugE60iu1DZsst-urI&currency=GBP"></script>
<script src="app.js"></script>

</body>
</html>
