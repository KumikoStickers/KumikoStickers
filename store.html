<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Store</title>

  <link rel="stylesheet" href="style.css">

  <style>
    :root{
      --bg:#0f0f12;
      --card:#17171c;
      --accent:#b08cff;
      --text:#f2f2f2;
      --muted:#a0a0a0;
    }

    body{
      margin:0;
      font-family:system-ui, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 30px;
      border-bottom:1px solid #222;
      position:sticky;
      top:0;
      background:rgba(15,15,18,0.9);
      backdrop-filter:blur(8px);
    }

    h1{
      font-size:20px;
      letter-spacing:1px;
    }

    .cart-icon{
      cursor:pointer;
      background:var(--card);
      padding:10px 14px;
      border-radius:12px;
      transition:0.2s;
    }

    .cart-icon:hover{
      transform:scale(1.05);
      background:#222;
    }

    main{
      padding:30px;
      max-width:1200px;
      margin:auto;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
      gap:20px;
    }

    .product{
      background:var(--card);
      border-radius:16px;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      transition:0.2s;
    }

    .product:hover{
      transform:translateY(-4px);
    }

    .product img{
      width:100%;
      border-radius:12px;
      aspect-ratio:1/1;
      object-fit:cover;
    }

    .product h3{
      margin:0;
      font-size:16px;
    }

    .price{
      color:var(--accent);
      font-weight:bold;
    }

    button{
      padding:10px;
      border:none;
      border-radius:10px;
      background:var(--accent);
      color:black;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      filter:brightness(1.1);
    }

    .cart{
      position:fixed;
      right:-320px;
      top:0;
      width:300px;
      height:100%;
      background:var(--card);
      padding:20px;
      transition:0.3s;
      overflow:auto;
      border-left:1px solid #222;
    }

    .cart.open{
      right:0;
    }
  </style>
</head>

<body>

<header>
  <h1>My Store ✦</h1>
  <div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<main>
  <div id="products" class="grid"></div>
</main>

<div id="cart" class="cart">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <p>Total: £<span id="total">0</span></p>
  <button onclick="checkout()">Checkout</button>
</div>

<script src="app.js"></script>
</body>
</html>
